<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" sizes="any">

  <!-- CSS -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/utilities.css">

  <title>404 – ページが見つかりません | 金子 真理</title>

  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-8);
      gap: var(--space-6);
    }
    .error-page__code {
      font-family: var(--font-mono);
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: var(--fw-bold);
      color: var(--color-bg-muted);
      line-height: 1;
      letter-spacing: var(--ls-tight);
    }
    .error-page__title {
      font-size: var(--fs-2xl);
      font-weight: var(--fw-bold);
    }
    .error-page__message {
      font-size: var(--fs-base);
      color: var(--color-text-secondary);
      max-width: 40ch;
    }
  </style>
</head>
<body>

  <main id="main">
    <div class="error-page">
      <p class="error-page__code en">404</p>
      <h1 class="error-page__title" data-i18n="page_404.title">ページが見つかりません</h1>
      <p class="error-page__message" data-i18n="page_404.message">
        お探しのページは存在しないか、移動した可能性があります。
      </p>
      <a class="btn btn--primary btn--lg" href="index.html" data-i18n="page_404.back">
        トップへ戻る
      </a>
    </div>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
